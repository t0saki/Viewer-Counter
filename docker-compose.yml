services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: viewer_counter
      POSTGRES_USER: viewer
      POSTGRES_PASSWORD: viewerpass
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viewer -d viewer_counter"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      VC_DB_DSN: "postgres://viewer:viewerpass@db:5432/viewer_counter?sslmode=disable"
      VC_SERVER_ADDR: ":8080"
      VC_IP_SALT: "change-me-to-a-long-random-string"
      VC_ADMIN_TOKEN: "change-me-admin-token"
    ports:
      - "8080:8080"
    # Mount a real config to override defaults; env vars above cover the
    # essentials so this works out of the box.
    volumes:
      - ./config.example.yaml:/app/config.yaml:ro

volumes:
  db_data:
