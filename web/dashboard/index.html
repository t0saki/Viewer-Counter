<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Viewer-Counter Dashboard</title>
<style>
  :root {
    --bg: #0f1117; --panel: #1a1d27; --border: #2a2e3a; --fg: #e6e8ee;
    --muted: #8b90a0; --accent: #5b8cff; --accent2: #2dd4bf; --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .config { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
  input, select, button {
    background: var(--panel); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; font-size: 13px;
  }
  input { min-width: 180px; }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button:hover { filter: brightness(1.1); }
  main { padding: 24px; display: grid; grid-template-columns: 1fr 1.3fr; gap: 24px; align-items: start; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; min-height: 80px;
  }
  .panel h2 { margin: 0 0 12px; font-size: 14px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-weight: 500; }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: rgba(91,140,255,.08); }
  tbody tr.active { background: rgba(91,140,255,.16); }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .stat-row { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { }
  .stat .v { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat .k { color: var(--muted); font-size: 12px; }
  .chart-controls { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .muted { color: var(--muted); }
  .err { color: var(--danger); padding: 8px 0; }
  svg text { fill: var(--muted); font-size: 10px; }
  .selpage { color: var(--accent2); font-weight: 600; word-break: break-all; }
  .ip-mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>Viewer<span>·</span>Counter</h1>
  <div class="config">
    <input id="apiBase" placeholder="API base (e.g. http://localhost:8080)">
    <input id="siteKey" placeholder="site key (optional filter)">
    <input id="token" type="password" placeholder="admin token">
    <button class="primary" id="loadBtn">Load</button>
  </div>
</header>
<main>
  <section class="panel" id="pagesPanel">
    <h2>Pages</h2>
    <div id="pagesErr" class="err" hidden></div>
    <table>
      <thead><tr><th>Site</th><th>Page</th><th class="num">Total</th></tr></thead>
      <tbody id="pagesBody"><tr><td colspan="3" class="muted">Enter API base + token, then Load.</td></tr></tbody>
    </table>
  </section>

  <section class="panel" id="detailPanel">
    <h2>Detail</h2>
    <div id="detailEmpty" class="muted">Select a page on the left.</div>
    <div id="detail" hidden>
      <div class="selpage" id="selPage"></div>
      <div class="stat-row" style="margin-top:12px">
        <div class="stat"><div class="v" id="statTotal">–</div><div class="k">Total</div></div>
        <div class="stat"><div class="v" id="statRecent">–</div><div class="k" id="statRecentK">Recent</div></div>
      </div>
      <div class="chart-controls">
        <select id="interval"><option value="hour">Hourly (7d)</option><option value="day">Daily (30d)</option></select>
        <span class="muted" id="chartHint"></span>
      </div>
      <div id="chart"></div>
      <h2 style="margin-top:20px">Top IPs</h2>
      <div id="ipErr" class="err" hidden></div>
      <table>
        <thead><tr><th>IP (hash)</th><th class="num">Views</th></tr></thead>
        <tbody id="ipBody"></tbody>
      </table>
    </div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);
const LS = window.localStorage;
let selected = null;

function cfg() {
  return {
    base: $("apiBase").value.replace(/\/+$/, ""),
    site: $("siteKey").value.trim(),
    token: $("token").value.trim(),
  };
}

function saveCfg() {
  LS.setItem("vc_base", $("apiBase").value);
  LS.setItem("vc_site", $("siteKey").value);
  LS.setItem("vc_token", $("token").value);
}

async function api(path, params) {
  const c = cfg();
  const url = new URL(c.base + path);
  for (const [k, v] of Object.entries(params || {})) url.searchParams.set(k, v);
  const res = await fetch(url, { headers: { Authorization: "Bearer " + c.token } });
  if (!res.ok) throw new Error((await res.text()).trim() || ("HTTP " + res.status));
  return res.json();
}

async function loadPages() {
  const err = $("pagesErr"); err.hidden = true;
  try {
    const c = cfg();
    const data = await api("/api/v1/admin/pages", c.site ? { site: c.site, limit: 200 } : { limit: 200 });
    const body = $("pagesBody"); body.innerHTML = "";
    if (!data.pages || !data.pages.length) {
      body.innerHTML = '<tr><td colspan="3" class="muted">No pages yet.</td></tr>';
      return;
    }
    for (const p of data.pages) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${esc(p.site)}</td><td>${esc(p.page)}</td><td class="num">${p.total.toLocaleString()}</td>`;
      tr.onclick = () => selectPage(p, tr);
      body.appendChild(tr);
    }
  } catch (e) {
    err.hidden = false; err.textContent = "Failed to load pages: " + e.message;
  }
}

async function selectPage(p, tr) {
  selected = p;
  document.querySelectorAll("#pagesBody tr").forEach(r => r.classList.remove("active"));
  if (tr) tr.classList.add("active");
  $("detailEmpty").hidden = true; $("detail").hidden = false;
  $("selPage").textContent = p.site + "  →  " + p.page;
  $("statTotal").textContent = p.total.toLocaleString();
  await Promise.all([loadRecent(p), loadChart(p), loadIPs(p)]);
}

async function loadRecent(p) {
  try {
    const d = await api("/api/v1/recent", { site: p.site, page: p.page, window: "24h" });
    $("statRecent").textContent = d.count.toLocaleString();
    $("statRecentK").textContent = "Last " + d.window;
  } catch (e) { $("statRecent").textContent = "–"; }
}

async function loadChart(p) {
  const interval = $("interval").value;
  const span = interval === "day" ? 30 * 86400 : 7 * 86400;
  const to = new Date();
  const from = new Date(to.getTime() - span * 1000);
  try {
    const d = await api("/api/v1/admin/timeseries", {
      site: p.site, page: p.page, interval,
      from: from.toISOString(), to: to.toISOString(),
    });
    drawChart(d.points || []);
    $("chartHint").textContent = (d.points || []).length + " buckets";
  } catch (e) {
    $("chart").innerHTML = '<div class="err">' + esc(e.message) + '</div>';
  }
}

async function loadIPs(p) {
  const err = $("ipErr"); err.hidden = true;
  const body = $("ipBody"); body.innerHTML = "";
  try {
    const d = await api("/api/v1/admin/by-ip", { site: p.site, page: p.page, limit: 20 });
    if (!d.rows || !d.rows.length) { body.innerHTML = '<tr><td colspan="2" class="muted">No data.</td></tr>'; return; }
    for (const r of d.rows) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td class="ip-mono">${esc(r.ip_hash)}</td><td class="num">${r.count.toLocaleString()}</td>`;
      body.appendChild(tr);
    }
  } catch (e) {
    err.hidden = false; err.textContent = e.message;
  }
}

function drawChart(points) {
  const W = 520, H = 180, pad = { l: 36, r: 12, t: 12, b: 24 };
  const el = $("chart");
  if (!points.length) { el.innerHTML = '<div class="muted">No data in range.</div>'; return; }
  const counts = points.map(p => p.count);
  const maxV = Math.max(1, ...counts);
  const n = points.length;
  const iw = W - pad.l - pad.r, ih = H - pad.t - pad.b;
  const x = i => pad.l + (n === 1 ? iw / 2 : (i / (n - 1)) * iw);
  const y = v => pad.t + ih - (v / maxV) * ih;
  let path = "", area = "";
  points.forEach((p, i) => {
    const px = x(i).toFixed(1), py = y(p.count).toFixed(1);
    path += (i === 0 ? "M" : "L") + px + "," + py + " ";
  });
  area = `M${x(0).toFixed(1)},${(pad.t+ih).toFixed(1)} ` +
    points.map((p,i)=>`L${x(i).toFixed(1)},${y(p.count).toFixed(1)}`).join(" ") +
    ` L${x(n-1).toFixed(1)},${(pad.t+ih).toFixed(1)} Z`;
  const ticks = [0, maxV];
  let gridSvg = ticks.map(t =>
    `<line x1="${pad.l}" y1="${y(t).toFixed(1)}" x2="${W-pad.r}" y2="${y(t).toFixed(1)}" stroke="#2a2e3a"/>` +
    `<text x="4" y="${(y(t)+3).toFixed(1)}">${t}</text>`).join("");
  const firstLbl = fmtBucket(points[0].bucket), lastLbl = fmtBucket(points[n-1].bucket);
  el.innerHTML =
    `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="xMidYMid meet">` +
    gridSvg +
    `<path d="${area}" fill="rgba(91,140,255,.15)"/>` +
    `<path d="${path}" fill="none" stroke="#5b8cff" stroke-width="2"/>` +
    `<text x="${pad.l}" y="${H-6}">${firstLbl}</text>` +
    `<text x="${W-pad.r}" y="${H-6}" text-anchor="end">${lastLbl}</text>` +
    `</svg>`;
}

function fmtBucket(s) {
  const d = new Date(s);
  if (isNaN(d)) return s;
  return d.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit" });
}

function esc(s) { return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])); }

$("loadBtn").onclick = () => { saveCfg(); loadPages(); };
$("interval").onchange = () => { if (selected) loadChart(selected); };
window.addEventListener("DOMContentLoaded", () => {
  $("apiBase").value = LS.getItem("vc_base") || window.location.origin;
  $("siteKey").value = LS.getItem("vc_site") || "";
  $("token").value = LS.getItem("vc_token") || "";
});
</script>
</body>
</html>
